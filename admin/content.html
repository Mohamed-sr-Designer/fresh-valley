<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content — Fresh Valley Admin</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,400..500&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <style>
    .ctabs { display:flex; gap:.4rem; flex-wrap:wrap; background:var(--ad-surface); border:1px solid var(--ad-line); border-radius:14px; padding:.4rem; margin-bottom:1.2rem; box-shadow:var(--ad-shadow-sm); position:sticky; top:72px; z-index:20; }
    .ctab { display:flex; align-items:center; gap:.5rem; padding:.6rem 1rem; border-radius:10px; font-size:.88rem; font-weight:600; color:var(--ad-muted); transition:all .15s; }
    .ctab:hover { background:var(--ad-surface-2); color:var(--ad-text); }
    .ctab.on { background:var(--ad-accent); color:#fff; }
    .ctab.on svg { color:var(--ad-brass); }
    .ctab svg { width:17px; height:17px; }
    .cpanel { display:none; }
    .cpanel.on { display:block; }
  </style>
</head>
<body class="ad-body">
  <div id="adRoot"></div>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    (async function () {
      const A = window.ADMIN, I = A.I;
      if (!A.requireAuth("content")) return;
      await A.boot();
      const root = A.mountShell("content");
      const c = A.content();
      const s = A.settings();

      const SEC_LABELS = { categories: "Category strip", bestsellers: "Best sellers slider", aoh: "The Art of Hosting", trusted: "Trusted source", boxes: "Boxes flagship", reviews: "Customer reviews" };
      const DEFAULT_ORDER = ["categories", "bestsellers", "aoh", "trusted", "boxes", "reviews"];
      let secOrder = (Array.isArray(c.sec_order) && c.sec_order.length ? c.sec_order.slice() : DEFAULT_ORDER.slice()).filter(k => SEC_LABELS[k]);
      DEFAULT_ORDER.forEach(k => { if (secOrder.indexOf(k) < 0) secOrder.push(k); });

      const val = (k) => c[k] != null ? c[k] : "";
      const esc = (x) => String(x == null ? "" : x).replace(/"/g, "&quot;").replace(/</g, "&lt;");
      const on = (k) => c["sec_" + k] !== false;

      // Per-page tabs. f: [key, label, placeholder(default), multiline?]
      const TABS = [
        { id: "home", label: "Home", icon: "grid", groups: [
          { title: "Hero", fields: [
            ["hero_eyebrow", "Eyebrow", "Export-grade · Delivered next-day"],
            ["hero_title", "Headline", "Egypt's premium produce market."],
            ["hero_sub", "Sub-text", "Hand-graded fruits, vegetables and curated boxes…", true],
            ["hero_cta", "Primary button label", "Shop the market"],
          ] },
          { title: "Section headings", fields: [
            ["cat_title", "Categories — title", "Shop by category"],
            ["bs_eyebrow", "Best sellers — eyebrow", "Loved by our tables"],
            ["bs_title", "Best sellers — title", "Best Sellers"],
            ["boxes_eyebrow", "Boxes — eyebrow", "Our flagship"],
            ["boxes_title", "Boxes — title", "Fresh Valley Boxes"],
            ["why_eyebrow", "Why — eyebrow", "Why Fresh Valley"],
            ["why_title", "Why — title", "Graded like an export house. Delivered like a guest."],
            ["rev_eyebrow", "Reviews — eyebrow", "★ 4.9 · 1,400+ verified orders"],
            ["rev_title", "Reviews — title", "Loved across Cairo"],
          ] },
          { title: "Homepage Art-of-Hosting block", fields: [
            ["aoh_eyebrow", "Eyebrow", "Our signature · only from Fresh Valley"],
            ["aoh_title", "Headline", "Arrive with the season."],
            ["aoh_lead", "Lead", "No one visits empty-handed…", true],
          ] },
          { title: "Sections — order & visibility", sectionsList: true },
        ] },
        { id: "aoh", label: "Art of Hosting", icon: "doc", groups: [
          { title: "Page hero", fields: [
            ["aoh_page_eyebrow", "Eyebrow", "The Art of Hosting"],
            ["aoh_page_title", "Headline", "Arrive with something they'll remember."],
            ["aoh_page_sub", "Sub-text", "In Egypt, no one visits empty-handed…", true],
          ] },
        ] },
        { id: "about", label: "About", icon: "doc", groups: [
          { title: "About hero", fields: [
            ["about_eyebrow", "Eyebrow", "Our Story"],
            ["about_title", "Headline", "Produce, treated with the care it deserves."],
            ["about_lead", "Lead paragraph", "Fresh Valley is a premium produce company…", true],
          ] },
        ] },
        { id: "contact", label: "Contact", icon: "doc", groups: [
          { title: "Contact hero", fields: [
            ["contact_eyebrow", "Eyebrow", "We're glad to help"],
            ["contact_title", "Headline", "Talk to Fresh Valley"],
            ["contact_sub", "Sub-text", "A question about an order, a hosting idea…", true],
          ] },
        ] },
        { id: "global", label: "Footer & Global", icon: "gear", groups: [
          { title: "Brand", fields: [
            ["__storeName", "Store name", s.storeName],
            ["tagline", "Tagline", "Export-grade produce for better hosting"],
          ] },
          { title: "Footer", fields: [
            ["footer_news_title", "Newsletter heading", "Eat with the season. Host a little better."],
            ["footer_blurb", "Brand blurb", "Export-grade produce, curated for modern hosting…", true],
          ] },
          { title: "Announcement bar", announce: true },
          { title: "Cart & promo", fields: [
            ["promo_text", "Free-delivery line", "Shown in the cart — leave blank for default"],
          ] },
        ] },
      ];

      function field(f) {
        const [key, label, ph, multi] = f;
        const v = key === "__storeName" ? s.storeName : val(key);
        return `<div class="field"><label>${label}</label>
          ${multi ? `<textarea class="ta" data-k="${key}" placeholder="${esc(ph)}">${esc(v)}</textarea>`
            : `<input class="inp" data-k="${key}" value="${esc(v)}" placeholder="${esc(ph)}">`}</div>`;
      }
      function groupCard(g) {
        if (g.announce) {
          return `<div class="card"><div class="card-head"><div class="card-title">${g.title}</div>
            <button class="switch" id="annSw" role="switch" aria-checked="${c.announce_on ? "true" : "false"}"></button></div>
            <div class="card-pad"><div class="field" style="margin-bottom:0"><label>Bar text</label>
              <input class="inp" data-k="announce_text" value="${esc(val("announce_text"))}" placeholder="e.g. Free delivery on orders over EGP 600"></div></div></div>`;
        }
        if (g.sectionsList) return secCardHtml();
        return `<div class="card"><div class="card-head"><div class="card-title">${g.title}</div></div>
          <div class="card-pad">${g.fields.map(field).join("")}</div></div>`;
      }
      function secRow(k, i) {
        return `<div class="set-row" style="gap:.6rem">
          <div class="flex" style="gap:.5rem;align-items:center">
            <span style="display:flex;flex-direction:column;gap:1px">
              <button class="icon-act sec-up" data-k="${k}" title="Move up" ${i === 0 ? "disabled style=\"opacity:.3\"" : ""}>${I.up}</button>
              <button class="icon-act sec-down" data-k="${k}" title="Move down" ${i === secOrder.length - 1 ? "disabled style=\"opacity:.3\"" : ""}>${I.down}</button>
            </span>
            <div class="lbl"><strong>${SEC_LABELS[k]}</strong><span>#${i + 1} on the homepage</span></div>
          </div>
          <button class="switch sec-sw" data-k="${k}" role="switch" aria-checked="${on(k) ? "true" : "false"}"></button>
        </div>`;
      }
      function secCardHtml() {
        return `<div class="card"><div class="card-head"><div class="card-title">Sections — order &amp; visibility</div><span class="sub muted" style="font-size:.8rem">reorder with ↑ ↓</span></div>
          <div class="card-pad" style="padding-top:.3rem" id="secBody">${secOrder.map(secRow).join("")}</div></div>`;
      }
      function renderSections() { const el = document.getElementById("secBody"); if (el) { el.innerHTML = secOrder.map(secRow).join(""); wireSections(); } }
      function wireSections() {
        document.querySelectorAll(".sec-up").forEach(b => b.addEventListener("click", () => { const i = secOrder.indexOf(b.dataset.k); if (i > 0) { secOrder.splice(i - 1, 0, secOrder.splice(i, 1)[0]); renderSections(); } }));
        document.querySelectorAll(".sec-down").forEach(b => b.addEventListener("click", () => { const i = secOrder.indexOf(b.dataset.k); if (i < secOrder.length - 1) { secOrder.splice(i + 1, 0, secOrder.splice(i, 1)[0]); renderSections(); } }));
        document.querySelectorAll(".sec-sw").forEach(sw => sw.addEventListener("click", () => sw.setAttribute("aria-checked", sw.getAttribute("aria-checked") !== "true")));
      }

      function draw() {
        root.innerHTML = A.pageHead("Content", "Pick a page, edit its words. Everything goes live on the storefront when you save.",
          `<a class="btn btn--ghost btn--sm" href="../index.html" target="_blank">${I.eye} Preview</a><button class="btn btn--primary btn--sm" id="saveBtn">Save all</button>`)
          + `<div class="ctabs" id="ctabs">${TABS.map((t, i) => `<button class="ctab ${i === 0 ? "on" : ""}" data-tab="${t.id}">${I[t.icon]} ${t.label}</button>`).join("")}</div>`
          + `<div id="cContent">${TABS.map((t, i) => `<div class="cpanel ${i === 0 ? "on" : ""}" data-panel="${t.id}"><div class="stack">${t.groups.map(groupCard).join("")}</div></div>`).join("")}</div>`
          + `<div style="position:sticky;bottom:0;padding:1rem 0;margin-top:1rem;background:linear-gradient(transparent,var(--ad-bg) 40%);display:flex;justify-content:flex-end">
              <button class="btn btn--primary" id="saveBtn2">Save all changes</button></div>`;
        wire();
      }

      function wire() {
        document.getElementById("ctabs").addEventListener("click", e => {
          const b = e.target.closest("[data-tab]"); if (!b) return;
          document.querySelectorAll(".ctab").forEach(x => x.classList.toggle("on", x === b));
          document.querySelectorAll(".cpanel").forEach(p => p.classList.toggle("on", p.dataset.panel === b.dataset.tab));
        });
        document.querySelectorAll(".switch:not(.sec-sw)").forEach(sw => sw.addEventListener("click", () => sw.setAttribute("aria-checked", sw.getAttribute("aria-checked") !== "true")));
        wireSections();
        document.getElementById("saveBtn").addEventListener("click", save);
        document.getElementById("saveBtn2").addEventListener("click", save);
      }

      function save() {
        const patch = {};
        document.querySelectorAll("#cContent [data-k]").forEach(el => {
          if (el.classList.contains("switch")) return;
          const k = el.dataset.k;
          if (k === "__storeName") { A.saveSettings({ storeName: el.value.trim() || s.storeName }); return; }
          if (el.classList.contains("sec-sw")) return;
          patch[k] = el.value.trim();
        });
        const ann = document.getElementById("annSw"); if (ann) patch.announce_on = ann.getAttribute("aria-checked") === "true";
        document.querySelectorAll(".sec-sw").forEach(sw => { patch["sec_" + sw.dataset.k] = sw.getAttribute("aria-checked") === "true"; });
        patch.sec_order = secOrder.slice();
        A.setContent(patch);
        A.toast("Content saved · live on store");
        setTimeout(() => location.reload(), 700);
      }

      draw();
    })();
  </script>
</body>
</html>
