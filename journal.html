<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Journal — Fresh Valley</title>
  <meta name="description" content="Recipes, hosting tips and produce education from Fresh Valley. Read, cook, and host a little better.">
  <meta name="theme-color" content="#1A2A1D">
  <link rel="canonical" href="https://freshvalley.eg/journal.html">
  <meta property="og:title" content="The Fresh Valley Journal">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,400..500&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .featured { display:grid; grid-template-columns: 1.25fr 1fr; gap: clamp(1.5rem,4vw,3.5rem); align-items:center; }
    .featured .f-media { border-radius: var(--radius-lg); overflow:hidden; aspect-ratio: 16/11; box-shadow: var(--shadow-lg); position:relative; }
    .featured .f-media img { width:100%; height:100%; object-fit:cover; transition: transform 1.2s var(--ease-out); }
    .featured:hover .f-media img { transform: scale(1.04); }
    .featured h2 { font-size: var(--step-3); line-height:1.08; margin:.5rem 0 1rem; }
    .featured .f-media .badge { position:absolute; top:1rem; left:1rem; }
    @media (max-width:860px){ .featured { grid-template-columns:1fr; } }
  </style>
</head>

<body data-page="journal">
  <div id="fv-header"></div>

  <main>
    <section class="page-header">
      <div class="container">
        <nav class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Journal</span></nav>
        <p class="eyebrow">Read, cook, host</p>
        <h1>The Fresh Valley Journal</h1>
        <p>Recipes, hosting tips and a little produce education — for setting a better table, every week.</p>
      </div>
    </section>

    <!-- Featured -->
    <section class="section section--tight">
      <div class="container">
        <article class="featured" id="featured" data-reveal></article>
      </div>
    </section>

    <!-- Filter + grid -->
    <section class="section section--tight section--paper2">
      <div class="container">
        <div class="split-head" data-reveal style="margin-bottom:var(--space-lg)">
          <div class="section-head"><p class="eyebrow">All articles</p><h2 class="title" style="font-size:var(--step-2)">More from the Journal</h2></div>
          <div class="filter-pills" id="catPills"></div>
        </div>
        <div class="products-grid products-grid--3" id="grid"></div>
      </div>
    </section>
  </main>

  <div id="fv-footer"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    (function () {
      const arts = FV.data.articles;
      const featured = arts[0];
      const rest = arts.slice(1);

      // Featured
      document.getElementById("featured").innerHTML = `
        <a class="f-media" href="article.html?slug=${featured.slug}">
          <img src="${FV.img(featured.image)}" alt="${featured.title}">
          <span class="badge">Featured</span>
        </a>
        <div>
          <span class="a-cat" style="font-size:var(--step--2);letter-spacing:.14em;text-transform:uppercase;color:var(--brass-deep);font-weight:600">${featured.category}</span>
          <h2>${featured.title}</h2>
          <p class="lead">${featured.excerpt}</p>
          <p class="muted" style="font-size:var(--step--2);margin:1.2rem 0">${featured.author} · ${featured.date} · ${featured.read}</p>
          <a class="link-arrow" href="article.html?slug=${featured.slug}">Read the article
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
        </div>`;

      // Categories
      const cats = ["All", ...Array.from(new Set(rest.map(a => a.category)))];
      let active = "All";
      const pills = document.getElementById("catPills");
      const grid = document.getElementById("grid");
      function renderGrid() {
        const list = active === "All" ? rest : rest.filter(a => a.category === active);
        grid.innerHTML = list.map(FV.articleCardHTML).join("");
        FV.observeReveals();
      }
      pills.innerHTML = cats.map(c => `<button class="pill" data-c="${c}" aria-pressed="${c === "All"}">${c}</button>`).join("");
      pills.querySelectorAll("[data-c]").forEach(b => b.addEventListener("click", () => {
        active = b.dataset.c;
        pills.querySelectorAll("[data-c]").forEach(x => x.setAttribute("aria-pressed", x === b));
        renderGrid();
      }));
      renderGrid();
      FV.observeReveals();
    })();
  </script>
</body>
</html>
