<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account — Fresh Valley</title>
  <meta name="theme-color" content="#1A2A1D">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,400..500&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .acct-layout { display:grid; grid-template-columns: 250px 1fr; gap: clamp(1.5rem,4vw,3rem); align-items:start; }
    .acct-nav { position:sticky; top:calc(var(--header-h) + 1.5rem); display:flex; flex-direction:column; gap:.2rem; }
    .acct-nav .greet { padding:0 .9rem 1rem; }
    .acct-nav .greet .hi { font-family:var(--font-display); font-size:var(--step-1); color:var(--forest); }
    .acct-nav .greet .em { font-size:var(--step--2); color:var(--text-faint); }
    .acct-nav button { display:flex; align-items:center; gap:.7rem; padding:.75rem .9rem; border-radius:var(--radius); font-size:var(--step--1); font-weight:500; color:var(--text-muted); text-align:left; transition:all .2s; }
    .acct-nav button:hover { background:var(--bone); color:var(--forest); }
    .acct-nav button[aria-current="true"] { background:var(--forest); color:var(--cream); }
    .acct-nav button svg { width:18px; height:18px; flex-shrink:0; }
    .acct-nav .signout { margin-top:.6rem; color:var(--text-faint); }
    .panel { display:none; }
    .panel.active { display:block; }
    .panel h2 { font-size:var(--step-2); margin-bottom:.4rem; }
    .panel .sub { color:var(--text-muted); margin-bottom:var(--space-lg); }
    .card-box { background:#FCFAF3; border:1px solid var(--line-soft); border-radius:var(--radius-lg); padding:1.6rem; }
    .card-box + .card-box { margin-top:1rem; }
    .addr-grid, .pay-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .order-card { background:#FCFAF3; border:1px solid var(--line-soft); border-radius:var(--radius-lg); padding:1.5rem; margin-bottom:1rem; }
    .order-card .oc-head { display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; flex-wrap:wrap; padding-bottom:1rem; border-bottom:1px solid var(--line-soft); margin-bottom:1rem; }
    .order-card .oc-id { font-weight:600; color:var(--forest); }
    .order-card .oc-meta { font-size:var(--step--2); color:var(--text-faint); }
    .status { font-size:var(--step--2); font-weight:600; padding:.35em .8em; border-radius:var(--radius-pill); }
    .status.delivered { background:#E2E8D5; color:var(--forest-mid); }
    .status.transit { background:var(--brass-tint); color:var(--brass-deep); }
    .order-card .oc-items { display:flex; gap:.6rem; flex-wrap:wrap; margin-bottom:1rem; }
    .order-card .oc-items img { width:54px; height:54px; border-radius:var(--radius-sm); object-fit:cover; background:var(--ink); }
    .order-card .oc-foot { display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap; }
    .sub-card { display:grid; grid-template-columns:90px 1fr auto; gap:1.2rem; align-items:center; }
    .sub-card img { width:90px; height:90px; border-radius:var(--radius); object-fit:cover; }
    .field-static { padding:.85em 1em; background:var(--bone); border-radius:var(--radius-sm); color:var(--text); font-size:var(--step-0); }
    .toggle-pill { width:46px; height:26px; border-radius:999px; background:var(--line); position:relative; transition:background .25s; flex-shrink:0; }
    .toggle-pill[aria-pressed="true"] { background:var(--forest); }
    .toggle-pill::after { content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:transform .25s; }
    .toggle-pill[aria-pressed="true"]::after { transform:translateX(20px); }
    .set-row { display:flex; justify-content:space-between; align-items:center; gap:1rem; padding:1rem 0; border-bottom:1px solid var(--line-soft); }

    /* ---- Auth (sign in / create account) ---- */
    .auth-wrap { display:grid; grid-template-columns:1fr 1fr; gap:clamp(1.5rem,4vw,3rem); align-items:stretch; max-width:960px; margin-inline:auto; }
    .auth-card { background:var(--surface); border:1px solid var(--line-soft); border-radius:var(--radius-lg); padding:clamp(1.6rem,3vw,2.4rem); box-shadow:var(--shadow-sm); }
    .auth-tabs { display:flex; background:var(--bone); border-radius:var(--radius-pill); padding:.3rem; gap:.3rem; margin-bottom:1.5rem; }
    .auth-tabs button { flex:1; padding:.7em 1em; border-radius:var(--radius-pill); font-size:var(--step--1); font-weight:600; color:var(--text-muted); transition:all .25s; }
    .auth-tabs button[aria-current="true"] { background:var(--surface); color:var(--forest); box-shadow:var(--shadow-sm); }
    .auth-card .field { margin-bottom:1rem; }
    .auth-alt { font-size:var(--step--1); color:var(--text-muted); margin-top:1.1rem; text-align:center; }
    .auth-alt a { color:var(--brass-deep); font-weight:600; cursor:pointer; text-decoration:underline; text-underline-offset:2px; }
    .auth-note { font-size:var(--step--2); color:var(--text-faint); margin-top:1.2rem; text-align:center; line-height:1.5; }
    .auth-aside { position:relative; border-radius:var(--radius-lg); overflow:hidden; min-height:380px; display:flex; align-items:flex-end; color:var(--cream); }
    .auth-aside img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    .auth-aside::after { content:""; position:absolute; inset:0; background:linear-gradient(to top, rgba(10,26,17,.85), rgba(10,26,17,.2) 70%); }
    .auth-aside-b { position:relative; z-index:2; padding:clamp(1.5rem,3vw,2.2rem); }
    .auth-aside-b h2 { color:var(--cream); font-size:var(--step-2); }
    .auth-aside-b p { color:rgba(244,239,228,.82); font-size:var(--step--1); margin-top:.5rem; max-width:32ch; }
    @media (max-width:760px){ .auth-wrap { grid-template-columns:1fr; } .auth-aside { min-height:170px; order:-1; } }

    @media (max-width:820px){
      .acct-layout { grid-template-columns:1fr; }
      .acct-nav { position:static; flex-direction:row; overflow-x:auto; gap:.4rem; padding-bottom:.5rem; }
      .acct-nav .greet, .acct-nav .signout { display:none; }
      .acct-nav button { white-space:nowrap; }
      .addr-grid, .pay-grid { grid-template-columns:1fr; }
    }
  </style>
</head>

<body data-page="account">
  <div id="fv-header"></div>

  <main>
    <section class="page-header" style="padding-bottom:var(--space-lg)">
      <div class="container">
        <nav class="breadcrumb"><a href="index.html">Home</a><span>/</span><span id="acctCrumb">My Account</span></nav>
        <h1 id="acctTitle">My Account</h1>
      </div>
    </section>

    <!-- Auth gate (shown when signed out) -->
    <section class="section section--tight" id="authGate" style="display:none">
      <div class="container auth-wrap">
        <div class="auth-card">
          <div class="auth-tabs">
            <button type="button" data-auth="signin" aria-current="true">Sign in</button>
            <button type="button" data-auth="signup">Create account</button>
          </div>
          <form id="authForm" novalidate>
            <div class="field auth-name" hidden><label>Full name</label><input class="input" name="name" autocomplete="name" placeholder="Your name"></div>
            <div class="field"><label>Email</label><input class="input" type="email" name="email" autocomplete="email" placeholder="you@email.com" required></div>
            <div class="field"><label>Password</label><input class="input" type="password" name="password" autocomplete="current-password" placeholder="••••••••" required minlength="4"></div>
            <button class="btn btn--brass btn--block btn--lg" type="submit" id="authSubmit">Sign in</button>
            <p class="auth-alt" id="authAlt">New here? <a data-auth-switch="signup">Create an account</a></p>
          </form>
          <p class="auth-note">Demo — sign in with <b style="color:var(--brass-deep)">guest@freshvalley.eg</b> / <b style="color:var(--brass-deep)">fresh123</b>, or any email &amp; password. Nothing is sent; your details stay in this browser only.</p>
        </div>
        <aside class="auth-aside">
          <img src="assets/img/banners/packaging.jpg" alt="Fresh Valley produce wrapped as a gift" loading="lazy">
          <div class="auth-aside-b">
            <h2>Welcome to Fresh Valley</h2>
            <p>Track orders, save favourites, reorder in a tap, and manage your hosting boxes.</p>
          </div>
        </aside>
      </div>
    </section>

    <!-- Dashboard (shown when signed in) -->
    <div id="dashWrap">
      <section class="section section--tight">
        <div class="container acct-layout">
          <nav class="acct-nav" id="acctNav"></nav>
          <div id="panels"></div>
        </div>
      </section>
    </div>
  </main>

  <div id="fv-footer"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    (function () {
      function currentUser(){ try { return JSON.parse(localStorage.getItem("fv_user")); } catch { return null; } }
      const stored = currentUser();
      const authGate = document.getElementById("authGate");
      const dashWrap = document.getElementById("dashWrap");

      if (!stored) {
        dashWrap.style.display = "none"; authGate.style.display = "";
        document.getElementById("acctTitle").textContent = "Welcome";
        document.getElementById("acctCrumb").textContent = "Sign in";
        wireAuth();
        return;
      }
      authGate.style.display = "none"; dashWrap.style.display = "";

      function wireAuth() {
        const form = document.getElementById("authForm"), submit = document.getElementById("authSubmit"), altP = document.getElementById("authAlt"), nameF = form.querySelector(".auth-name");
        let mode = "signin";
        function setMode(m) { mode = m;
          document.querySelectorAll("[data-auth]").forEach(b => b.setAttribute("aria-current", b.dataset.auth === m));
          nameF.hidden = m !== "signup"; nameF.querySelector("input").required = m === "signup";
          submit.textContent = m === "signup" ? "Create account" : "Sign in";
          altP.innerHTML = m === "signup" ? 'Already have an account? <a data-auth-switch="signin">Sign in</a>' : 'New here? <a data-auth-switch="signup">Create an account</a>';
        }
        document.querySelectorAll("[data-auth]").forEach(b => b.addEventListener("click", () => setMode(b.dataset.auth)));
        document.addEventListener("click", e => { const s = e.target.closest("[data-auth-switch]"); if (s) { e.preventDefault(); setMode(s.dataset.authSwitch); } });
        form.addEventListener("submit", e => { e.preventDefault();
          if (!form.checkValidity()) { form.reportValidity(); return; }
          const email = form.email.value.trim();
          const name = (mode === "signup" && form.name.value.trim()) ? form.name.value.trim()
            : email.split("@")[0].replace(/[._-]+/g, " ").replace(/\b\w/g, c => c.toUpperCase());
          localStorage.setItem("fv_user", JSON.stringify({ name, email }));
          if (FV.clients) FV.clients.upsert({ name, email, status: mode === "signup" ? "pending" : "active" });
          FV.toast("Welcome, " + name.split(" ")[0]);
          location.reload();
        });
        setMode("signin");
      }

      const user = { name: stored.name || "Guest", first: (stored.name || "Guest").split(" ")[0], email: stored.email || "", phone: "+20 10 1234 5678", since: "2026" };
      // Real orders this customer has placed (captured at checkout) take priority;
      // fall back to sample orders so the demo account still looks populated.
      const realOrders = (FV.orders ? FV.orders.all() : [])
        .filter(o => o.customer && o.customer.email === user.email)
        .map(o => ({
          id: o.id,
          date: new Date(o.date).toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" }),
          status: o.status === "delivered" ? "delivered" : "transit",
          items: o.items.map(i => i.slug).filter(sl => FV.find(sl)),
          total: o.total, slot: o.slot,
        }));
      const sampleOrders = [
        { id: "FV204881", date: "2 June 2026", status: "transit", items: ["strawberry","red-grapes","medjool-dates"], total: 0, slot: "Wed, 3–6" },
        { id: "FV198450", date: "24 May 2026", status: "delivered", items: ["orange","carrot","tomato","cucumber"], total: 0 },
        { id: "FV191207", date: "11 May 2026", status: "delivered", items: ["mango","green-grapes","banana"], total: 0 },
      ];
      sampleOrders.forEach(o => o.total = o.items.reduce((s, sl) => s + FV.defaultVariant(FV.find(sl)).price, 0) + 45);
      const orders = realOrders.length ? realOrders : sampleOrders;

      const NAV = [
        ["profile","user","Profile"], ["addresses","pin","Addresses"], ["orders","bag","Orders"],
        ["wishlist","heart","Wishlist"], ["cards","shield","Saved Cards"], ["subscriptions","leaf","Subscriptions"],
        ["reorder","truck","Reorder"], ["settings","sparkle","Settings"],
      ];

      // ---- Nav ----
      const navEl = document.getElementById("acctNav");
      navEl.innerHTML = `<div class="greet"><div class="hi">Hello, ${user.first}</div><div class="em">${user.email}</div></div>` +
        NAV.map(n => `<button data-tab="${n[0]}">${FV.icon(n[1])} ${n[2]}</button>`).join("") +
        `<button class="signout">${FV.icon("arrow")} Sign out</button>`;
      navEl.querySelector(".signout").addEventListener("click", () => { localStorage.removeItem("fv_user"); location.assign("account.html"); });

      // ---- Panels ----
      const orderItemsHtml = o => o.items.map(s => `<img src="${FV.img(s)}" alt="${FV.find(s).name}" title="${FV.find(s).name}">`).join("");
      const panelsEl = document.getElementById("panels");
      const arrow = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

      panelsEl.innerHTML = `
      <div class="panel" data-panel="profile">
        <h2>Profile</h2><p class="sub">Your details, kept simple.</p>
        <div id="profileBox"></div>
      </div>

      <div class="panel" data-panel="addresses">
        <h2>Addresses</h2><p class="sub">Where we bring your produce.</p>
        <div id="addrBox"></div>
      </div>

      <div class="panel" data-panel="orders">
        <h2>Orders</h2><p class="sub">Everything you've ordered, and where it is.</p>
        ${orders.map(o => `
          <div class="order-card">
            <div class="oc-head">
              <div><div class="oc-id">${o.id}</div><div class="oc-meta">${o.date}${o.slot ? " · arriving " + o.slot : ""}</div></div>
              <span class="status ${o.status}">${o.status === "transit" ? "In transit" : "Delivered"}</span>
            </div>
            <div class="oc-items">${orderItemsHtml(o)}</div>
            <div class="oc-foot">
              <strong style="color:var(--forest)">${FV.money(o.total)}</strong>
              <div style="display:flex;gap:.6rem;flex-wrap:wrap">
                <button class="btn btn--outline btn--sm" data-reorder="${o.id}">Reorder</button>
                <button class="btn btn--sm" data-receipt="${o.id}" style="--bg:var(--bone);--fg:var(--forest);--bd:var(--bone)">Receipt</button>
                ${o.status === "transit" ? `<button class="btn btn--sm" data-track>Track</button>` : ``}
              </div>
            </div>
          </div>`).join("")}
      </div>

      <div class="panel" data-panel="wishlist">
        <h2>Wishlist</h2><p class="sub">Saved for the right moment.</p>
        <div id="wishMini"></div>
      </div>

      <div class="panel" data-panel="cards">
        <h2>Saved Cards</h2><p class="sub">For a faster checkout. We never store full card numbers.</p>
        <div id="cardsBox"></div>
        <p class="secure-note" style="display:flex;gap:.5rem;align-items:center;font-size:var(--step--2);color:var(--text-faint);margin-top:1rem">${FV.icon("shield")} Stored securely with our payment provider — never on our servers.</p>
      </div>

      <div class="panel" data-panel="subscriptions">
        <h2>Subscriptions</h2><p class="sub">Your produce, on a quiet schedule.</p>
        <div id="subsBox"></div>
        <div class="card-box" style="text-align:center">
          <p class="muted" style="font-size:var(--step--1)">Add a hosting or organic reserve box on a schedule, and save the planning.</p>
          <a class="btn btn--brass btn--sm" href="products.html?cat=boxes" style="margin-top:.8rem">Explore subscriptions ${arrow}</a>
        </div>
      </div>

      <div class="panel" data-panel="reorder">
        <h2>Reorder</h2><p class="sub">Your regulars, one tap away.</p>
        <div class="card-box" style="margin-bottom:1.4rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap">
          <div><strong style="color:var(--forest)">Reorder your last order</strong><div class="oc-meta" style="font-size:var(--step--2);color:var(--text-faint)">${orders[0].id} · ${orders[0].items.length} items</div></div>
          <button class="btn btn--sm" data-reorder="${orders[0].id}">Add all to cart</button>
        </div>
        <p class="eyebrow" style="margin-bottom:1rem">Your most-ordered</p>
        <div class="products-grid" id="reorderGrid"></div>
      </div>

      <div class="panel" data-panel="settings">
        <h2>Settings</h2><p class="sub">Notifications and preferences.</p>
        <div class="card-box">
          <div class="set-row"><div><strong style="color:var(--forest)">Order updates</strong><div class="oc-meta" style="font-size:var(--step--2);color:var(--text-faint)">Delivery status by SMS</div></div><button class="toggle-pill" aria-pressed="true" aria-label="Toggle"></button></div>
          <div class="set-row"><div><strong style="color:var(--forest)">The Fresh Valley Letter</strong><div class="oc-meta" style="font-size:var(--step--2);color:var(--text-faint)">A monthly note, what's in season</div></div><button class="toggle-pill" aria-pressed="true" aria-label="Toggle"></button></div>
          <div class="set-row" style="border-bottom:none"><div><strong style="color:var(--forest)">Seasonal reminders</strong><div class="oc-meta" style="font-size:var(--step--2);color:var(--text-faint)">A nudge when your favourites are at their peak</div></div><button class="toggle-pill" aria-pressed="false" aria-label="Toggle"></button></div>
        </div>
      </div>`;

      // ---- Wishlist mini ----
      function renderWishMini() {
        const el = document.getElementById("wishMini");
        const items = FV.wish.items().map(FV.find).filter(Boolean);
        if (!items.length) el.innerHTML = `<div class="card-box" style="text-align:center"><p class="muted">Nothing saved yet.</p><a class="btn btn--outline btn--sm" href="products.html" style="margin-top:1rem">Browse the collection</a></div>`;
        else { el.innerHTML = `<div class="products-grid">${items.slice(0, 8).map(FV.productCardHTML).join("")}</div>`; FV.updateWishUI(); }
      }

      // ---- Reorder grid ----
      document.getElementById("reorderGrid").innerHTML =
        FV.byCollection("best-sellers").slice(0, 4).map(FV.productCardHTML).join("");

      /* ---- Editable account sections (saved per-browser; map to /api/me in prod) ---- */
      const acct = { get(k, fb) { try { const v = JSON.parse(localStorage.getItem(k)); return v == null ? fb : v; } catch { return fb; } }, set(k, v) { localStorage.setItem(k, JSON.stringify(v)); } };
      const gv = (id) => { const e = document.getElementById(id); return e ? String(e.value).trim() : ""; };
      const esc = (s) => String(s == null ? "" : s).replace(/"/g, "&quot;").replace(/</g, "&lt;");
      const $b = (id) => document.getElementById(id);
      const nameParts = (user.name || "").split(/\s+/);
      let addrs = acct.get("fv_addresses", [
        { id: 1, label: "Home", line: "Villa 22, South Lake", area: "New Cairo, Cairo", default: true },
        { id: 2, label: "Office", line: "Building 4, Beverly Hills", area: "Sheikh Zayed, Giza", default: false }]);
      let pcards = acct.get("fv_cards", [
        { id: 1, brand: "Visa", last4: "4291", exp: "09 / 27", default: true },
        { id: 2, brand: "Mastercard", last4: "7730", exp: "03 / 28", default: false }]);
      let subs = acct.get("fv_subs", [{ id: 1, name: "The Family Box · Weekly", price: 650, next: "Wednesday", active: true }]);

      function profile() { return acct.get("fv_profile", { first: nameParts[0] || user.first, last: nameParts.slice(1).join(" "), email: user.email, phone: user.phone || "" }); }
      function renderProfile(editing) {
        const p = profile(), b = $b("profileBox"); if (!b) return;
        if (editing) {
          b.innerHTML = `<div class="card-box"><div class="addr-grid">
            <div class="field"><label>First name</label><input class="input" id="pf_first" value="${esc(p.first)}"></div>
            <div class="field"><label>Last name</label><input class="input" id="pf_last" value="${esc(p.last)}"></div>
            <div class="field"><label>Email</label><input class="input" id="pf_email" type="email" value="${esc(p.email)}"></div>
            <div class="field"><label>Phone</label><input class="input" id="pf_phone" value="${esc(p.phone)}"></div></div>
            <div style="margin-top:1.2rem;display:flex;gap:.6rem"><button class="btn btn--sm" id="pf_save">Save changes</button><button class="btn btn--outline btn--sm" id="pf_cancel">Cancel</button></div></div>`;
          b.querySelector("#pf_save").onclick = () => {
            const np = { first: gv("pf_first") || p.first, last: gv("pf_last"), email: gv("pf_email") || p.email, phone: gv("pf_phone") };
            acct.set("fv_profile", np);
            const u = acct.get("fv_user", {}); u.name = (np.first + " " + np.last).trim() || u.name; u.email = np.email || u.email; localStorage.setItem("fv_user", JSON.stringify(u));
            if (FV.clients) FV.clients.upsert({ name: u.name, email: np.email, phone: np.phone });
            FV.toast("Profile saved"); renderProfile(false);
          };
          b.querySelector("#pf_cancel").onclick = () => renderProfile(false);
        } else {
          b.innerHTML = `<div class="card-box"><div class="addr-grid">
            <div class="field"><label>First name</label><div class="field-static">${esc(p.first) || "—"}</div></div>
            <div class="field"><label>Last name</label><div class="field-static">${esc(p.last) || "—"}</div></div>
            <div class="field"><label>Email</label><div class="field-static">${esc(p.email) || "—"}</div></div>
            <div class="field"><label>Phone</label><div class="field-static">${esc(p.phone) || "—"}</div></div></div>
            <button class="btn btn--outline btn--sm" id="pf_edit" style="margin-top:1.2rem">Edit details</button></div>`;
          b.querySelector("#pf_edit").onclick = () => renderProfile(true);
        }
      }
      function renderAddr(editId) {
        const b = $b("addrBox"); if (!b) return;
        let html = addrs.length ? `<div class="pay-grid">` + addrs.map(a => `<div class="card-box">
          <div style="display:flex;justify-content:space-between;align-items:center"><strong style="color:var(--forest)">${esc(a.label)}</strong>${a.default ? `<span class="status delivered">Default</span>` : `<a class="link-arrow" style="font-size:var(--step--2);cursor:pointer" data-adef="${a.id}">Set default</a>`}</div>
          <p class="muted" style="margin-top:.6rem;font-size:var(--step--1)">${esc(a.line)}<br>${esc(a.area)}</p>
          <div style="margin-top:1rem;display:flex;gap:.8rem"><a class="link-arrow" style="font-size:var(--step--2);cursor:pointer" data-aedit="${a.id}">Edit</a><a class="link-arrow" style="font-size:var(--step--2);cursor:pointer" data-arem="${a.id}">Remove</a></div></div>`).join("") + `</div>`
          : `<div class="card-box" style="text-align:center"><p class="muted">No addresses yet.</p></div>`;
        if (editId) { const a = editId === "new" ? null : addrs.find(x => x.id === editId); html += `<div class="card-box" style="margin-top:1rem"><div class="addr-grid">
          <div class="field"><label>Label</label><input class="input" id="ad_label" value="${esc(a ? a.label : "")}" placeholder="Home / Office"></div>
          <div class="field"><label>Area</label><input class="input" id="ad_area" value="${esc(a ? a.area : "")}" placeholder="New Cairo, Cairo"></div>
          <div class="field" style="grid-column:1/-1"><label>Address</label><input class="input" id="ad_line" value="${esc(a ? a.line : "")}" placeholder="Building, street, apartment"></div></div>
          <div style="margin-top:1rem;display:flex;gap:.6rem"><button class="btn btn--sm" id="ad_save">Save address</button><button class="btn btn--outline btn--sm" id="ad_cancel">Cancel</button></div></div>`; }
        else html += `<button class="btn btn--outline btn--sm" id="ad_add" style="margin-top:1rem">${FV.icon("plus")} Add an address</button>`;
        b.innerHTML = html;
        if (editId) {
          b.querySelector("#ad_save").onclick = () => { const o = { label: gv("ad_label") || "Address", area: gv("ad_area"), line: gv("ad_line") };
            if (editId === "new") { o.id = Date.now(); o.default = !addrs.length; addrs.push(o); } else Object.assign(addrs.find(x => x.id === editId), o);
            acct.set("fv_addresses", addrs); FV.toast("Address saved"); renderAddr(null); };
          b.querySelector("#ad_cancel").onclick = () => renderAddr(null);
        } else {
          b.querySelector("#ad_add").onclick = () => renderAddr("new");
          b.querySelectorAll("[data-aedit]").forEach(el => el.onclick = () => renderAddr(+el.dataset.aedit));
          b.querySelectorAll("[data-arem]").forEach(el => el.onclick = () => { addrs = addrs.filter(x => x.id !== +el.dataset.arem); if (addrs.length && !addrs.some(x => x.default)) addrs[0].default = true; acct.set("fv_addresses", addrs); FV.toast("Address removed"); renderAddr(null); });
          b.querySelectorAll("[data-adef]").forEach(el => el.onclick = () => { addrs.forEach(x => x.default = x.id === +el.dataset.adef); acct.set("fv_addresses", addrs); renderAddr(null); });
        }
      }
      function renderCards(adding) {
        const b = $b("cardsBox"); if (!b) return;
        let html = pcards.length ? `<div class="pay-grid">` + pcards.map(c => `<div class="card-box">
          <div style="display:flex;justify-content:space-between;align-items:center"><strong style="color:var(--forest)">${esc(c.brand)} •••• ${esc(c.last4)}</strong>${c.default ? `<span class="status delivered">Default</span>` : `<a class="link-arrow" style="font-size:var(--step--2);cursor:pointer" data-cdef="${c.id}">Set default</a>`}</div>
          <p class="muted" style="margin-top:.6rem;font-size:var(--step--1)">Expires ${esc(c.exp)}</p>
          <div style="margin-top:1rem"><a class="link-arrow" style="font-size:var(--step--2);cursor:pointer" data-crem="${c.id}">Remove</a></div></div>`).join("") + `</div>`
          : `<div class="card-box" style="text-align:center"><p class="muted">No saved cards.</p></div>`;
        if (adding) html += `<div class="card-box" style="margin-top:1rem"><div class="addr-grid">
          <div class="field"><label>Card type</label><select class="select" id="cd_brand"><option>Visa</option><option>Mastercard</option></select></div>
          <div class="field"><label>Last 4 digits</label><input class="input" id="cd_last4" inputmode="numeric" maxlength="4" placeholder="1234"></div>
          <div class="field"><label>Expiry</label><input class="input" id="cd_exp" placeholder="MM / YY"></div></div>
          <p class="muted" style="font-size:var(--step--2);margin-top:.6rem">We only store the last 4 digits — never the full card number.</p>
          <div style="margin-top:1rem;display:flex;gap:.6rem"><button class="btn btn--sm" id="cd_save">Save card</button><button class="btn btn--outline btn--sm" id="cd_cancel">Cancel</button></div></div>`;
        else html += `<button class="btn btn--outline btn--sm" id="cd_add" style="margin-top:1rem">${FV.icon("plus")} Add a card</button>`;
        b.innerHTML = html;
        if (adding) {
          b.querySelector("#cd_save").onclick = () => { const last4 = gv("cd_last4").replace(/\D/g, "").slice(-4); if (last4.length < 4) { FV.toast("Enter the last 4 digits"); return; }
            pcards.push({ id: Date.now(), brand: gv("cd_brand") || "Visa", last4, exp: gv("cd_exp") || "—", default: !pcards.length }); acct.set("fv_cards", pcards); FV.toast("Card saved"); renderCards(false); };
          b.querySelector("#cd_cancel").onclick = () => renderCards(false);
        } else {
          b.querySelector("#cd_add").onclick = () => renderCards(true);
          b.querySelectorAll("[data-crem]").forEach(el => el.onclick = () => { pcards = pcards.filter(x => x.id !== +el.dataset.crem); if (pcards.length && !pcards.some(x => x.default)) pcards[0].default = true; acct.set("fv_cards", pcards); FV.toast("Card removed"); renderCards(false); });
          b.querySelectorAll("[data-cdef]").forEach(el => el.onclick = () => { pcards.forEach(x => x.default = x.id === +el.dataset.cdef); acct.set("fv_cards", pcards); renderCards(false); });
        }
      }
      function renderSubs() {
        const b = $b("subsBox"); if (!b) return;
        b.innerHTML = subs.length ? subs.map(s => `<div class="card-box"><div class="sub-card">
          <img src="${FV.img("orange")}" alt="">
          <div><strong style="color:var(--forest);font-family:var(--font-display);font-size:var(--step-1)">${esc(s.name)}</strong>
          <p class="muted" style="font-size:var(--step--1);margin-top:.3rem">Next delivery: ${esc(s.next)} · ${FV.money(s.price)} / week</p>
          <span class="status ${s.active ? "delivered" : "transit"}" style="margin-top:.6rem;display:inline-block">${s.active ? "Active" : "Paused"}</span></div>
          <div style="display:flex;flex-direction:column;gap:.5rem"><button class="btn btn--sm" data-spause="${s.id}" style="--bg:var(--bone);--fg:var(--forest);--bd:var(--bone)">${s.active ? "Pause" : "Resume"}</button><button class="btn btn--outline btn--sm" data-srem="${s.id}">Cancel</button></div></div></div>`).join("")
          : `<div class="card-box" style="text-align:center"><p class="muted">No active subscriptions.</p></div>`;
        b.querySelectorAll("[data-spause]").forEach(el => el.onclick = () => { const s = subs.find(x => x.id === +el.dataset.spause); s.active = !s.active; acct.set("fv_subs", subs); FV.toast(s.active ? "Subscription resumed" : "Subscription paused"); renderSubs(); });
        b.querySelectorAll("[data-srem]").forEach(el => el.onclick = () => { if (confirm("Cancel this subscription?")) { subs = subs.filter(x => x.id !== +el.dataset.srem); acct.set("fv_subs", subs); FV.toast("Subscription cancelled"); renderSubs(); } });
      }
      renderProfile(false); renderAddr(null); renderCards(false); renderSubs();

      // ---- Tabs ----
      function show(tab) {
        navEl.querySelectorAll("[data-tab]").forEach(b => b.setAttribute("aria-current", b.dataset.tab === tab));
        panelsEl.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.dataset.panel === tab));
        if (tab === "wishlist") renderWishMini();
        history.replaceState({}, "", "#" + tab);
        window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
        FV.observeReveals(); FV.updateWishUI();
      }
      navEl.querySelectorAll("[data-tab]").forEach(b => b.addEventListener("click", () => show(b.dataset.tab)));

      // Reorder + track
      // Build a full order object for the designed receipt (real order if captured, else from sample)
      function fullOrder(o) {
        const real = (FV.orders ? FV.orders.all() : []).find(x => x.id === o.id);
        if (real) return real;
        const items = o.items.map(sl => { const p = FV.find(sl); const v = FV.defaultVariant(p); return { name: p.name, variant: v.variant, qty: 1, price: v.price }; });
        const sub = items.reduce((s, i) => s + i.price * i.qty, 0);
        const delivery = sub >= (FV.settings ? FV.settings.freeThreshold : 600) ? 0 : (FV.settings ? FV.settings.deliveryFee : 45);
        return { id: o.id, date: new Date().toISOString(), status: o.status,
          customer: { name: user.name, email: user.email, phone: user.phone, area: "New Cairo" },
          address: "New Cairo", slot: o.slot, payment: "Credit card", channel: "Website",
          items, subtotal: sub, delivery, total: sub + delivery };
      }

      panelsEl.addEventListener("click", e => {
        const ro = e.target.closest("[data-reorder]");
        if (ro) { const o = orders.find(x => x.id === ro.dataset.reorder); o.items.forEach(s => FV.quickAdd(s)); return; }
        const rc = e.target.closest("[data-receipt]");
        if (rc && FV.receipt) { const o = orders.find(x => x.id === rc.dataset.receipt); if (o) FV.receipt.open(fullOrder(o)); return; }
        if (e.target.closest("[data-track]")) { FV.toast("Your order is on the way", "Arriving " + orders[0].slot); }
        const t = e.target.closest(".toggle-pill");
        if (t) t.setAttribute("aria-pressed", t.getAttribute("aria-pressed") !== "true");
      });

      const initial = (location.hash || "#profile").slice(1);
      show(NAV.some(n => n[0] === initial) ? initial : "profile");
    })();
  </script>
</body>
</html>
