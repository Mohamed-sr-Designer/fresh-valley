<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist — Fresh Valley</title>
  <meta name="theme-color" content="#1A2A1D">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,400..500&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body data-page="wishlist">
  <div id="fv-header"></div>

  <main>
    <section class="page-header" style="padding-bottom:var(--space-lg)">
      <div class="container">
        <nav class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Wishlist</span></nav>
        <div class="split-head">
          <h1>Saved for later</h1>
          <button class="btn btn--outline btn--sm hide-mobile" id="addAll" style="display:none">Add all to cart</button>
        </div>
      </div>
    </section>

    <section class="section section--tight">
      <div class="container">
        <div class="products-grid" id="grid"></div>
        <div class="empty-state" id="empty" style="padding:4rem 1rem" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M12 20s-7-4.6-9.3-9C1 8 2.5 4.7 6 4.7c2 0 3.2 1.1 4 2.3.8-1.2 2-2.3 4-2.3 3.5 0 5 3.3 3.3 6.3C19 15.4 12 20 12 20Z"/></svg>
          <h3 style="margin:1rem 0 .4rem">Nothing saved yet</h3>
          <p>Tap the heart on anything you love, and it will wait for you here.</p>
          <a class="btn mt-lg" href="products.html" style="margin-top:1.5rem">Browse the collection
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
        </div>
      </div>
    </section>

    <!-- Recommendations -->
    <section class="section section--paper2" id="recSection">
      <div class="container">
        <div class="section-head" data-reveal style="margin-bottom:var(--space-lg)">
          <p class="eyebrow">You may also love</p>
          <h2 class="title" style="font-size:var(--step-2)">From our best sellers</h2>
        </div>
        <div class="products-grid" id="rec"></div>
      </div>
    </section>
  </main>

  <div id="fv-footer"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    (function () {
      const grid = document.getElementById("grid");
      const empty = document.getElementById("empty");
      const addAll = document.getElementById("addAll");

      function render() {
        const slugs = FV.wish.items();
        const items = slugs.map(FV.find).filter(Boolean);
        if (!items.length) {
          grid.innerHTML = ""; empty.hidden = false; addAll.style.display = "none";
          return;
        }
        empty.hidden = true;
        addAll.style.display = "";
        grid.innerHTML = items.map(FV.productCardHTML).join("");
        FV.updateWishUI(); FV.observeReveals();
      }

      addAll.addEventListener("click", () => {
        FV.wish.items().map(FV.find).filter(Boolean).forEach(p => FV.quickAdd(p.slug));
      });

      // Recommendations
      document.getElementById("rec").innerHTML =
        FV.byCollection("best-sellers").slice(0, 4).map(FV.productCardHTML).join("");

      render();
      document.addEventListener("fv:wish", render);
      FV.observeReveals(); FV.updateWishUI();
    })();
  </script>
</body>
</html>
